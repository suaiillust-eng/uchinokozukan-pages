* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {

  line-height: 1.8;
  color: #222;
  background: #FFF8F0;
  margin: 0;
  padding: 0;
}
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 20px 80px;
}
header {
  text-align: center;
  padding: 24px 0 16px;
  border-bottom: 2px solid #FFCC8A;
  margin-bottom: 24px;
}
header h1 {
  font-size: 24px;
  margin: 0 0 8px;
  color: #B36A2D;
}
.last-updated {
  font-size: 13px;
  color: #888;
}
h2 {
  font-size: 18px;
  color: #B36A2D;
  margin-top: 32px;
  margin-bottom: 12px;
  padding-bottom: 4px;
  border-bottom: 1px solid #F0D8B0;
}
p {
  margin: 0 0 14px;
  white-space: pre-wrap;
  font-size: 15px;
}
nav.back-link {
  margin-top: 40px;
  text-align: center;
  font-size: 14px;
}
nav.back-link a {

  text-decoration: none;
}
nav.back-link a:hover { text-decoration: underline; }
footer {
  text-align: center;
  font-size: 12px;
  color: #999;
  margin-top: 32px;
  padding-top: 16px;
  border-top: 1px solid #EEE;
}

.contact-box {
  background: #fff;
  padding: 24px;
  border-radius: 12px;
  border: 1px solid #F0D8B0;
  margin-top: 24px;
}
.contact-box .label {
  font-size: 13px;
  color: #888;
  margin-top: 16px;
  margin-bottom: 4px;
}
.contact-box .label:first-child { margin-top: 0; }
.contact-box .value {
  font-size: 16px;
  color: #222;
  word-break: break-all;
}
.contact-box .value a {
  color: #B36A2D;
  text-decoration: none;
}
.contact-box .value a:hover { text-decoration: underline; }
.note {
  font-size: 13px;
  color: #777;
  margin-top: 24px;
  padding: 16px;
  background: #FFF0D8;
  border-radius: 8px;
}
</style>
</head>
<body>
<div class="container">
<header>
